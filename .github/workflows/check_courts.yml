name: Tennis Court Availability Check

on:
  schedule:
    # Hourly fallback in case the self-chain breaks.
    - cron: "0 6-23 * * *"
  workflow_dispatch:
    inputs:
      send_all:
        description: "Send all currently available slots (ignores deduplication)"
        type: boolean
        default: false

# Prevent overlapping runs
concurrency:
  group: tennis-check
  cancel-in-progress: true

jobs:
  check:
    name: Check court availability
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore slot state cache
        uses: actions/cache@v4
        with:
          path: state/seen_slots.json
          key: tennis-state-v1-${{ github.run_id }}
          restore-keys: |
            tennis-state-v1-

      - name: Check court availability
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAYS_AHEAD: "7"
          SEND_ALL: ${{ github.event.inputs.send_all }}
        run: python check_courts.py

      - name: Trigger next run
        if: ${{ always() && github.event.inputs.send_all != 'true' }}
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          for i in 1 2 3 4; do
            curl -s -f -m 30 -X POST \
              -H "Authorization: Bearer $CRON_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/4rani-b/Tennis/actions/workflows/check_courts.yml/dispatches \
              -d '{"ref":"main"}' && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
