name: Tennis Court Availability Check

on:
  schedule:
    - cron: "0 * * * *"    # Top of the hour
    - cron: "30 * * * *"   # Half-hour — ensures continuous coverage
  workflow_dispatch:
    inputs:
      send_all:
        description: "Send all currently available slots (ignores deduplication)"
        type: boolean
        default: false

# A new run cancels the current one. State is saved before exit (if: always),
# so cancellation is clean and deduplication is never broken.
concurrency:
  group: tennis-check
  cancel-in-progress: true

jobs:
  check:
    name: Check courts
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state/seen_slots.json
          key: tennis-state-v1-${{ github.run_id }}
          restore-keys: |
            tennis-state-v1-

      - name: Check courts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAYS_AHEAD: "7"
          SEND_ALL: ${{ github.event.inputs.send_all }}
        run: |
          if [ "${SEND_ALL}" = "true" ]; then
            python check_courts.py
          else
            # Loop for 28 minutes, then exit cleanly before the next cron fires.
            end=$(($(date +%s) + 1680))
            while [ "$(date +%s)" -lt "$end" ]; do
              python check_courts.py || echo "WARNING: check_courts.py failed with exit code $?"
              sleep 15
            done
          fi

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/seen_slots.json
          key: tennis-state-v1-${{ github.run_id }}
