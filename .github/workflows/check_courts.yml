name: Tennis Court Availability Check

on:
  schedule:
    - cron: "*/15 * * * *"  # Safety net: restarts chain if it ever breaks
  workflow_dispatch:
    inputs:
      send_all:
        description: "Send all currently available slots (ignores deduplication)"
        type: boolean
        default: false

# cancel-in-progress: true means a cron (or a new manual trigger) always
# dislodges a stuck queued run. State is saved BEFORE the trigger step, so
# a cancellation mid-trigger cannot cause data loss.
concurrency:
  group: tennis-check
  cancel-in-progress: true

# GITHUB_TOKEN needs actions:write to trigger workflow_dispatch.
permissions:
  actions: write

jobs:
  check:
    name: Check courts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state/seen_slots.json
          key: tennis-state-v1-${{ github.run_id }}
          restore-keys: |
            tennis-state-v1-

      - name: Check courts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAYS_AHEAD: "7"
          SEND_ALL: ${{ github.event.inputs.send_all }}
        run: |
          if [ "${SEND_ALL}" = "true" ]; then
            python check_courts.py
          else
            python check_courts.py || echo "WARNING: check_courts.py failed with exit code $?"
          fi

      # Save state BEFORE triggering the next run, so a cancellation
      # mid-trigger cannot race the cache write.
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/seen_slots.json
          key: tennis-state-v1-${{ github.run_id }}

      # Only trigger when not cancelled. If this run was cancelled by a cron
      # or an incoming trigger, that incoming run handles continuation itself.
      - name: Trigger next run
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run check_courts.yml --ref main \
            || echo "WARNING: Failed to trigger next run — cron will restart within 15 min"
