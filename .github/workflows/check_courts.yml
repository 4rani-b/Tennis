name: Tennis Court Availability Check

on:
  schedule:
    # Runs every 15 minutes during UK waking hours (06:00–22:00 UTC).
    - cron: "0,15,30,45 6-22 * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check court availability
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore slot state cache
        uses: actions/cache@v4
        with:
          path: state/seen_slots.json
          key: tennis-state-v1-${{ github.run_id }}
          restore-keys: |
            tennis-state-v1-

      - name: Check court availability
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAYS_AHEAD: "7"
        run: python check_courts.py
