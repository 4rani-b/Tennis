name: Tennis Court Availability Check

on:
  schedule:
    # Runs every 30 minutes between 06:30 and 21:30 London time (UTC+1 BST / UTC+0 GMT).
    # Cron uses UTC; adjust hour range when clocks change (currently BST = UTC+1).
    - cron: "0,30 5-20 * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check court availability
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Check court availability
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DAYS_AHEAD: "7"
        run: python check_courts.py
